version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: trading_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradingbot}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Puerto no expuesto en prod — solo accesible internamente entre servicios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-tradingbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: trading_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - backtest_reports:/app/backtest_reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      bot:
        condition: service_healthy

volumes:
  postgres_data:
  backtest_reports:
