version: "3.9"

# Development overrides: hot reload for bot, Angular dev server
services:
  db:
    ports:
      - "5432:5432"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    volumes:
      - ./bot:/app
      - backtest_reports:/app/backtest_reports
    command: python -m bot.main
    environment:
      LOG_FORMAT: pretty

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx ng serve --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json
